name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm ci --prefix frontend
      - name: Lint
        run: npm run lint --prefix frontend
      - name: Test
        run: npm run test --prefix frontend
      - name: Validate repo-context.json
        run: node frontend/node_modules/validate-repo-context.js frontend/repo-context.json
